<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Academic Self-Efficacy Survey</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            margin: 0;
            padding: 40px;
        }
        .container {
            max-width: 800px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }

        .question-box {
            margin-bottom: 25px;
            padding: 20px;
            background-color: #f8f9fc;
            border-radius: 10px;
            transition: 0.3s;
        }

        .question-text {
            font-weight: bold;
            margin-bottom: 10px;
            color: #444;
        }
        .question-box:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .option {
            margin: 8px 0;
            padding: 8px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.2s;
        }
        .option:hover {
            background: #e3e6ff;
        }

        input[type="radio"] {
            margin-right: 10px;
            accent-color: #667eea;
        }

        button {
            display: block;
            width: 100%;
            margin-top: 30px;
            padding: 14px;
            font-size: 16px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

<div class="container">

    <h2>Academic Self-Efficacy Survey</h2>

    <form action="/submit" method="POST">

        <!-- hidden user info -->
        <input type="hidden" name="name" value="{{ name }}">
        <input type="hidden" name="dob" value="{{ dob }}">
        <input type="hidden" name="student_id" value="{{ student_id }}">

        {% for q in questions %}
            {% set q_index = loop.index0 %}

            <div class="question-box">

                <div class="question-text">
                    {{ loop.index }}. {{ q.question }}
                </div>

                {% for opt in q.options %}
                    <div class="option">
                        <input type="radio"
                               name="q{{ q_index }}"
                               value="{{ opt.score }}"
                               required>
                        {{ opt.text }}
                    </div>
                {% endfor %}

            </div>
        {% endfor %}

        <button type="submit">Submit Answers</button>

    </form>

</div>

</body>
</html>
