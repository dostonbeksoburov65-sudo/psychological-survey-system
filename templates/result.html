<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Survey Result</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            margin: 0;
            padding: 40px;
        }

        .container {
            max-width: 600px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h2 {
            color: #333;
        }

        .score {
            font-size: 40px;
            font-weight: bold;
            color: #667eea;
            margin: 20px 0;
        }

        .state {
            font-size: 20px;
            margin-bottom: 20px;
            color: #555;
        }

        canvas {
            margin-top: 20px;
        }

        .btn {
            margin-top: 25px;
            padding: 12px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
        }

        .btn:hover {
            background: #5563c1;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>📊 Your Result</h2>

    <div class="score">{{ score }}</div>

    <div class="state">{{ state }}</div>

    <canvas id="myChart"></canvas>

    <a href="/" class="btn">🔁 Take Again</a>

</div>

<script>
    const score = {{ score }};
    const maxScore = 80;  // 20 savol × 4 max

    const ctx = document.getElementById('myChart');

    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: ['Your Score', 'Max Score'],
            datasets: [{
                label: 'Result',
                data: [score, maxScore]
            }]
        }
    });
</script>

</body>
</html>
